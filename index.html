<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0F0F11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Minhas Finanças</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F0F11;--surf:#1A1A1F;--surf2:#22222A;--surf3:#2A2A34;
  --acc:#7C6AF7;--pos:#3DD68C;--warn:#F4A234;--neg:#F05C5C;
  --tx:#F0EFF5;--mu:#8B8A96;--bdr:rgba(255,255,255,0.07);--r:14px;--rs:8px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
.safe-top{height:env(safe-area-inset-top,16px)}
.hdr{padding:10px 18px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hd-l{display:flex;flex-direction:column}
.hd-ttl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu)}
.hd-sub{font-size:10px;color:var(--mu);margin-top:1px}
.hd-btn{width:32px;height:32px;border-radius:50%;background:var(--surf2);border:none;color:var(--tx);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.scrl{flex:1;overflow-y:auto;padding:0 14px 90px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scrl::-webkit-scrollbar{display:none}
.tbar{position:absolute;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdr);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px))}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer}
.tb-ic{font-size:18px;line-height:1}
.tb-lb{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mu)}
.tb.on .tb-lb{color:var(--acc)}
.view{display:none}.view.on{display:block}
.sec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between}

/* ── HERO (Tela Hoje) ── */
.hero{background:var(--surf);border-radius:var(--r);padding:18px 14px 14px;margin-bottom:10px;position:relative}
.hero-status{position:absolute;top:14px;right:14px;width:10px;height:10px;border-radius:50%}
.hero-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
.hero-num{font-size:44px;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:6px}
.hero-num.pos{color:var(--pos)}.hero-num.warn{color:var(--warn)}.hero-num.neg{color:var(--neg)}
.hero-dia{font-size:13px;font-weight:500;margin-bottom:14px}
.hero-dia.pos{color:var(--pos)}.hero-dia.warn{color:var(--warn)}.hero-dia.neg{color:var(--neg)}
.thm{height:5px;background:var(--surf3);border-radius:3px;overflow:hidden;margin-bottom:12px}
.thm-f{height:100%;border-radius:3px}
.hero-meta{display:flex;gap:14px}
.hm-item{font-size:11px;color:var(--mu)}
.hm-item span{color:var(--tx);font-weight:500;margin-left:3px}

/* ── BOTÃO RÁPIDO ── */
.quick-btn{width:100%;background:rgba(124,106,247,.12);border:1.5px solid rgba(124,106,247,.25);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:10px}
.qb-l{font-size:13px;font-weight:600;color:var(--acc)}
.qb-r{font-size:11px;color:var(--mu)}

/* ── ALERTAS ── */
.alert-bar{border-radius:var(--rs);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
.alert-bar.warn{background:rgba(244,162,52,.12);border-left:3px solid var(--warn)}
.alert-bar.ng{background:rgba(240,92,92,.12);border-left:3px solid var(--neg)}
.alert-bar.ok{background:rgba(61,214,140,.1);border-left:3px solid var(--pos)}
.alert-bar.info{background:rgba(124,106,247,.1);border-left:3px solid var(--acc)}
.ab-t{font-size:12px;font-weight:500;color:var(--tx);flex:1}
.ab-cta{font-size:11px;font-weight:600;color:var(--acc);white-space:nowrap}

/* ── EVENTOS ── */
.eventos-box{background:var(--surf);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ev-hd{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.ev-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mu)}
.ev-row{display:flex;align-items:center;padding:8px 14px;border-top:1px solid var(--bdr)}
.ev-dia{font-size:11px;font-weight:600;color:var(--mu);width:36px;flex-shrink:0}
.ev-nome{font-size:12px;font-weight:500;flex:1}
.ev-val{font-size:13px;font-weight:600;text-align:right}
.ev-val.in{color:var(--pos)}.ev-val.out{color:var(--neg)}
.ev-saldo-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:2px solid var(--bdr);background:var(--surf2)}
.ev-saldo-l{font-size:12px;font-weight:600}
.ev-saldo-v{font-size:15px;font-weight:700}

/* ── SIMULAR ── */
.sim-hero{background:var(--surf);border-radius:var(--r);padding:14px;margin-bottom:10px;text-align:center}
.sh-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.sh-v{font-size:16px;font-weight:600}
.sh-v.pos{color:var(--pos)}.sh-v.warn{color:var(--warn)}.sh-v.ng{color:var(--neg)}

.sim-card{background:var(--surf);border-radius:var(--r);padding:14px 14px 16px;margin-bottom:10px;overflow:hidden}
.sim-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mu);margin-bottom:8px;display:block;padding-left:2px}
.seg{display:flex;background:var(--surf2);border-radius:var(--rs);padding:3px;gap:3px;margin-bottom:12px}
.seg-b{flex:1;padding:9px 4px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:var(--mu);transition:all .15s;-webkit-tap-highlight-color:transparent}
.seg-b.on{background:var(--acc);color:#fff;box-shadow:0 2px 6px rgba(124,106,247,.4)}
.val-input-wrap{display:flex;align-items:center;gap:8px;background:var(--surf2);border-radius:var(--rs);padding:6px 14px;margin-bottom:12px;border:1.5px solid var(--acc);overflow:hidden;width:100%}
.val-pfx{font-size:16px;font-weight:600;color:var(--mu);flex-shrink:0;line-height:1}
.val-inp{background:transparent;border:none;color:var(--tx);font-size:22px;font-weight:700;flex:1;width:0;min-width:0;outline:none;text-align:right;padding:8px 0;-webkit-appearance:none;appearance:none;display:block}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.pb{background:var(--surf2);border:2px solid var(--bdr);border-radius:var(--rs);color:var(--mu);font-size:12px;font-weight:600;padding:10px 4px;cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.pb.on{border-color:var(--acc);background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(124,106,247,.35)}
.parc-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.parc-btn{flex-shrink:0;padding:9px 14px;border-radius:20px;border:2px solid var(--bdr);background:var(--surf2);color:var(--mu);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent}
.parc-btn.on{border-color:var(--acc);background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(124,106,247,.4)}

.resultado{border-radius:var(--r);padding:18px;text-align:center;margin-bottom:10px}
.resultado.ok{background:rgba(61,214,140,.1);border:1.5px solid rgba(61,214,140,.3)}
.resultado.warn{background:rgba(244,162,52,.1);border:1.5px solid rgba(244,162,52,.3)}
.resultado.ng{background:rgba(240,92,92,.1);border:1.5px solid rgba(240,92,92,.3)}
.res-veredicto{font-size:28px;font-weight:700;margin-bottom:4px}
.res-veredicto.ok{color:var(--pos)}.res-veredicto.warn{color:var(--warn)}.res-veredicto.ng{color:var(--neg)}
.res-sub{font-size:13px;opacity:.85;margin-bottom:10px}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.rg-cell{background:rgba(0,0,0,.2);border-radius:var(--rs);padding:8px 10px;text-align:left}
.rg-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.4);margin-bottom:3px}
.rg-v{font-size:13px;font-weight:600}

.imp-table{background:var(--surf);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.imp-hd{display:grid;grid-template-columns:44px 1fr 1fr 1fr;gap:0;background:var(--surf2);padding:8px 12px}
.imp-hc{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mu)}
.imp-hc:not(:first-child){text-align:right}
.imp-r{display:grid;grid-template-columns:44px 1fr 1fr 1fr;gap:0;padding:8px 12px;border-top:1px solid var(--bdr)}
.imp-r span{font-size:11px;font-weight:500;color:var(--mu)}
.imp-r span:not(:first-child){text-align:right;font-weight:600;color:var(--tx)}
.imp-r span.ng{color:var(--neg)}.imp-r span.pos{color:var(--pos)}.imp-r span.warn{color:var(--warn)}

/* ── CONFIGURAR ── */
.cfg-section{background:var(--surf);border-radius:var(--r);padding:14px;margin-bottom:10px;overflow:hidden}
.cfg-sec-t{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);margin-bottom:12px}
.cfg-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.cfg-f{display:flex;flex-direction:column;gap:4px}
.cfg-fl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mu)}
.cfg-inp{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:14px;font-weight:600;padding:10px 12px;width:100%;outline:none}
.cfg-inp:focus{border-color:var(--acc)}
.cfg-inp.c6{border-color:rgba(124,106,247,.4)}
.cfg-inp.itau{border-color:rgba(244,162,52,.4)}
.cfg-note{font-size:10px;color:var(--mu);margin-top:6px;line-height:1.5}
.up-btn{width:100%;padding:10px;background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.up-btn input{display:none}
.up-btn.done{border-color:rgba(61,214,140,.4);background:rgba(61,214,140,.06);color:var(--pos)}

.fixa-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--bdr)}
.fixa-row:first-of-type{border-top:none}
.f-body{flex:1;min-width:0}
.f-nm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.f-mt{font-size:10px;color:var(--mu);margin-top:1px}
.f-nat{font-size:12px;font-weight:600;color:var(--pos);flex-shrink:0;margin-right:8px;min-width:48px;text-align:right}
.ftog{width:36px;height:20px;border-radius:10px;position:relative;flex-shrink:0;cursor:pointer}
.ftog.on{background:var(--pos)}.ftog.off{background:var(--surf3)}
.ftog-d{position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;transition:left .2s}
.ftog.on .ftog-d{left:19px}.ftog.off .ftog-d{left:3px}
.addbtn{width:100%;padding:10px;background:rgba(124,106,247,.08);color:var(--acc);border:1.5px dashed rgba(124,106,247,.25);border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;margin-top:8px}

.obra-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--bdr)}
.obra-row:first-of-type{border-top:none}
.or-m{font-size:12px;color:var(--mu)}
.or-total{font-size:12px;font-weight:600;color:var(--warn)}
.or-inp{background:var(--surf2);border:1px solid rgba(244,162,52,.2);border-radius:6px;color:var(--warn);font-size:11px;font-weight:600;padding:4px 8px;width:80px;outline:none;text-align:right}

.inp-1{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:13px;padding:9px 11px;width:100%;outline:none;margin-bottom:8px}
.inp-1:focus{border-color:var(--acc)}
.inp-row{display:flex;gap:8px;margin-bottom:8px}
.inp-g{flex:1;display:flex;flex-direction:column;gap:4px}
.inp-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mu)}
.rule{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--bdr)}
.rule:first-of-type{border-top:none}
.rule-l{font-size:12px;font-weight:500}
.rule-s{font-size:10px;color:var(--mu);margin-top:1px}
.tog{width:38px;height:22px;background:var(--acc);border-radius:11px;position:relative;flex-shrink:0}
.tog-d{position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:19px}
.bdg{font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px}
.bdg-pos{background:rgba(61,214,140,.15);color:var(--pos)}
.bdg-warn{background:rgba(244,162,52,.15);color:var(--warn)}
.bdg-acc{background:rgba(124,106,247,.15);color:var(--acc)}
.clrbtn{width:100%;padding:10px;background:rgba(240,92,92,.08);color:var(--neg);border:1px solid rgba(240,92,92,.15);border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer}
.priv{font-size:10px;color:var(--mu);text-align:center;margin-top:12px;line-height:1.6}

/* MODAL */
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surf);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-t{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-x{font-size:20px;color:var(--mu);background:none;border:none;cursor:pointer}
.fld{margin-bottom:10px}
.fld-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:4px}
.fld input,.fld select{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-size:14px;padding:10px 12px;width:100%;outline:none}
.fld input:focus,.fld select:focus{border-color:var(--acc)}
.fld select option{background:var(--surf2)}
.div-prev{background:var(--surf2);border-radius:var(--rs);padding:10px 12px;margin:8px 0;font-size:11px;color:var(--mu);line-height:1.6}
.msave{width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer}
.mdel{width:100%;padding:10px;background:rgba(240,92,92,.08);color:var(--neg);border:1px solid rgba(240,92,92,.2);border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}

/* MODAL RÁPIDO */
.quick-modal{background:var(--surf);border-radius:20px 20px 0 0;padding:24px 18px calc(24px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px}
.qm-lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);text-align:center;margin-bottom:8px}
.qm-inp-wrap{display:flex;align-items:center;gap:10px;background:var(--surf2);border-radius:var(--r);padding:6px 18px;margin-bottom:16px;border:2px solid var(--acc)}
.qm-pfx{font-size:22px;font-weight:600;color:var(--mu)}
.qm-inp{background:transparent;border:none;color:var(--tx);font-size:36px;font-weight:700;flex:1;outline:none;text-align:right}
.qm-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.qm-pb{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--mu);font-size:12px;font-weight:600;padding:10px 4px;cursor:pointer;text-align:center}
.qm-pb.on{border-color:var(--acc);color:var(--acc);background:rgba(124,106,247,.1)}
.qm-result{border-radius:var(--r);padding:16px;text-align:center;margin-bottom:8px}
.qm-result.ok{background:rgba(61,214,140,.12)}
.qm-result.warn{background:rgba(244,162,52,.12)}
.qm-result.ng{background:rgba(240,92,92,.12)}
.qm-resp{font-size:36px;font-weight:700;margin-bottom:4px}
.qm-resp.ok{color:var(--pos)}.qm-resp.warn{color:var(--warn)}.qm-resp.ng{color:var(--neg)}
.qm-sub{font-size:12px;opacity:.8}
.qm-close{width:100%;padding:12px;background:var(--surf2);border:none;border-radius:var(--rs);color:var(--mu);font-size:13px;font-weight:500;cursor:pointer}

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);padding:9px 16px;font-size:12px;font-weight:500;opacity:0;transition:all .25s;z-index:400;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ldr{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,15,17,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px}
.spin{width:34px;height:34px;border:3px solid var(--surf3);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ldr-t{font-size:13px;color:var(--mu)}
.vis-det{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="safe-top"></div>
  <div class="hdr">
    <div class="hd-l">
      <div class="hd-ttl" id="hd-ttl">Hoje</div>
      <div class="hd-sub" id="hd-sub"></div>
    </div>
    <button class="hd-btn" onclick="refreshAll()">↻</button>
  </div>
  <div class="scrl" id="scrl">
    <div class="view on" id="v-hoje"></div>
    <div class="view" id="v-sim"></div>
    <div class="view" id="v-cfg"></div>
  </div>
  <nav class="tbar">
    <button class="tb on" id="tb-hoje" onclick="go('hoje')"><span class="tb-ic">◎</span><span class="tb-lb">Hoje</span></button>
    <button class="tb" id="tb-sim" onclick="go('sim')"><span class="tb-ic">⊕</span><span class="tb-lb">Simular</span></button>
    <button class="tb" id="tb-cfg" onclick="go('cfg')"><span class="tb-ic">⚙</span><span class="tb-lb">Configurar</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>
<div class="ldr" id="ldr" style="display:none"><div class="spin"></div><div class="ldr-t" id="ldr-t">Processando...</div></div>

<!-- MODAL FIXA -->
<div class="mbg" id="mbg" style="display:none" onclick="closeMod(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-t"><span id="mod-ttl">Despesa fixa</span><button class="modal-x" onclick="closeMod()">✕</button></div>
    <div class="fld"><div class="fld-l">Nome</div><input id="f-n" type="text" placeholder="Ex: Condomínio..."></div>
    <div class="fld"><div class="fld-l">Valor total (R$)</div><input id="f-v" type="number" step="0.01" oninput="updDiv()"></div>
    <div class="fld"><div class="fld-l">Vencimento (dia)</div><input id="f-d" type="number" min="1" max="31"></div>
    <div class="fld"><div class="fld-l">Categoria</div>
      <select id="f-c"><option value="CASA">🏠 Casa</option><option value="SAUDE">💊 Saúde</option>
        <option value="TRANSPORTE">🚗 Transporte</option><option value="ASSINATURA">📱 Assinatura</option>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── OBRA ──────────────────────────────────────────────────────────────────
const OBRA_C6  ={jun:7484,jul:4974,ago:2824,set:1236,out:767,nov:367,dez:367,jan:367};
const OBRA_ITAU={jun:4168,jul:4040,ago:4040,set:0,out:0,nov:0,dez:0,jan:0};

// ── DE PARA ───────────────────────────────────────────────────────────────
const DP={"MP *MARMORARIAGABRIEL":"OBRA","LEROY MERLIN":"OBRA","MP *BOXMARQUE":"OBRA","TOKIO MARINE":"CARRO","NISSAN":"CARRO","DROGARIA SAO PAULO":"REMEDIOS","MAXIMUS ESTETICA":"CARRO","CARRERA NI VOL":"CARRO","PEG PESE":"SUPERMERCADO","PAO DO PARQUE":"SUPERMERCADO","ORION AUTO POSTO":"GASOLINA","ESTAC SHOP":"ESTACIONAMENTO","TRACK AND FIELD":"VESTUARIO","TRACK FIELDRIO":"VESTUARIO","TRACK FIELDSAO":"VESTUARIO","TRACK AND FIEL":"VESTUARIO","AUTO POSTO MARAPE":"GASOLINA","APPLE.COM/BILL":"ASSINATURA","Z DELI":"RESTAURANTE","PETZ":"PET","PETLOVE":"PET","COBASI":"PET","IDEAL SERVICE":"OBRA","MP *REDESDEPROTEC":"OBRA","EBN*SPOTIFY":"ASSINATURA","DL*UBERRIDES":"TRANSPORTE","DL*99":"TRANSPORTE","99APP":"TRANSPORTE","UBER UBER":"TRANSPORTE","TOTALPASSSAO PAULO":"CORRIDA","PG *TF SPORTS":"CORRIDA","GIARDINO":"RESTAURANTE","SAMS COTIA":"SUPERMERCADO","REDE PAPA":"GASOLINA","POSTO DE SERV":"GASOLINA","LAVIA ESTAC":"ESTACIONAMENTO","DMSPARKING":"ESTACIONAMENTO","KEETABR":"IFOOD","IFD*":"IFOOD","LOJAS AMERICANAS":"VESTUARIO","APP *GOODRB":"VESTUARIO","YETTS COMERCIO":"VESTUARIO","DROGASMIL":"SAUDE","MC DONALDS":"RESTAURANTE","MERCADOLIVRE":"CASA","GOL LINHAS":"VIAGEM","EVENTIM":"LAZER","SYMPLA":"LAZER","MP *RADSONPLAN":"OBRA","DISTRIBUIDORA":"OBRA","SANTIL MARGINA":"OBRA","AMAZONMKTPLC*F":"OBRA","AMAZON MARKETP":"OBRA","DROGBA MEDICAMENTOS":"SAUDE","RODOLFO DETONI":"SAUDE","VINDI *ORIGIN":"SAUDE","EC *ESCOLA":"EDUCACAO","OXXO":"SUPERMERCADO","HOTEL":"HOTEL","GRECCO GELATO":"RESTAURANTE","BEYTI RESTAURANTE":"RESTAURANTE","F2 FRUTARIA":"RESTAURANTE","REVO MANUFACTORY":"RESTAURANTE","MANIA PRIME":"RESTAURANTE","AMAZON BRSAO":"OBRA","LUSTRES YAMAMURA":"OBRA","CORANTE TINTAS":"OBRA"};

const ORD=['mai','jun','jul','ago','set','out','nov','dez','jan'];
const MN={mai:'Mai',jun:'Jun',jul:'Jul',ago:'Ago',set:'Set',out:'Out',nov:'Nov',dez:'Dez',jan:'Jan'};
const M2={1:'jan',2:'fev',3:'mar',4:'abr',5:'mai',6:'jun',7:'jul',8:'ago',9:'set',10:'out',11:'nov',12:'dez'};

// ── STATE ─────────────────────────────────────────────────────────────────
const S={
  cards:{
    itau:{mode:'manual',parcial:0,obraItau:0,total:0,pessoal:0,fatura:null,loaded:false,venc:''},
    c6:  {mode:'manual',parcial:0,obraC6:0,total:0,fatura:null,loaded:false}
  },
  cfg:{sal1:4779.27,sal2:3164.11,dia_sal1:5,dia_sal2:20,venc_c6:5,venc_itau:20,
       saldo_c6:0,saldo_itau:0,sal_nat:7943,sal_amanda:6132,
       amanda_fixo:1500,  // transferência fixa Amanda dia 1 (carro 50% + 5ºandar + extras casa)
       ultima_atualizacao:null},
  obraAssumida:{jun:0,jul:0,ago:0,set:0,out:0,nov:0,dez:0},
  fixas:[
    {id:1, nome:'Condomínio',     valor:1122,   venc:8,  cat:'CASA',        div:'prop',  ativa:true},
    {id:2, nome:'Luz',            valor:129.97, venc:3,  cat:'CASA',        div:'prop',  ativa:true},
    {id:3, nome:'Gás',            valor:155.56, venc:7,  cat:'CASA',        div:'prop',  ativa:true},
    {id:4, nome:'Gás Instalação', valor:110.8,  venc:10, cat:'CASA',        div:'prop',  ativa:true},
    {id:5, nome:'Internet',       valor:166,    venc:6,  cat:'CASA',        div:'prop',  ativa:true},
    {id:6, nome:'5º andar',       valor:320,    venc:25, cat:'CASA',        div:'prop',  ativa:true},
    {id:7, nome:'Carro',          valor:1028,   venc:23, cat:'TRANSPORTE',  div:'50_50', ativa:true},
    {id:8, nome:'Inglês',         valor:330,    venc:10, cat:'EDUCACAO',    div:'nat',   ativa:true},
    {id:9, nome:'Prev',           valor:138.93, venc:20, cat:'OUTROS',      div:'nat',   ativa:true},
    {id:10,nome:'Seg Cartão',     valor:5.82,   venc:20, cat:'OUTROS',      div:'nat',   ativa:true},
    {id:11,nome:'Seg Vida',       valor:33.44,  venc:20, cat:'SAUDE',       div:'nat',   ativa:true},
    {id:12,nome:'Celular',        valor:80,     venc:20, cat:'ASSINATURA',  div:'nat',   ativa:true},
    {id:13,nome:'Imposto de Renda',valor:566,   venc:30, cat:'OUTROS',      div:'nat',   ativa:true},
  ],
  months:{},
  entradas:[], // entradas extras: {id,desc,valor,dia,mes,recorrente,ativa}
  depara:{},activeTab:'hoje',editId:null,editEntradaId:null,
  sim:{modo:'c6',parcelas:1,valor:0}
};

function save(){try{localStorage.setItem('fin11',JSON.stringify({cards:S.cards,cfg:S.cfg,fixas:S.fixas,entradas:S.entradas,obraAssumida:S.obraAssumida,months:S.months,depara:S.depara,sim:S.sim}))}catch(e){}}
function load(){
  try{const d=localStorage.getItem('fin11');if(d){const p=JSON.parse(d);
    if(p.cards){if(p.cards.itau)Object.assign(S.cards.itau,p.cards.itau);if(p.cards.c6)Object.assign(S.cards.c6,p.cards.c6);}
    if(p.cfg)Object.assign(S.cfg,p.cfg);if(p.fixas&&p.fixas.length)S.fixas=p.fixas;
    if(p.obraAssumida)Object.assign(S.obraAssumida,p.obraAssumida);
    if(p.months)S.months=p.months;if(p.sim)Object.assign(S.sim,p.sim);if(p.entradas)S.entradas=p.entradas;S.depara=p.depara||{};}}catch(e){}
  S.depara=Object.assign({},DP,S.depara);
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function fmt(v){return'R$ '+Math.round(Math.abs(v)).toLocaleString('pt-BR')}
function fmtSgn(v){return(v>=0?'+':'-')+' '+fmt(v)}
function cls(v){return v>1000?'pos':v>0?'warn':'neg'}
function today(){const d=new Date();return{d:d.getDate(),m:d.getMonth()+1,y:d.getFullYear(),dow:['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()],mn:['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][d.getMonth()]}}
function dim(m,y){return new Date(y,m,0).getDate()}
function tc(p){return p<65?'#3DD68C':p<90?'#F4A234':'#F05C5C'}
let tTmr;
function toast(msg,dur=2500){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(tTmr);tTmr=setTimeout(()=>e.classList.remove('show'),dur)}
function showLdr(msg){document.getElementById('ldr').style.display='flex';document.getElementById('ldr-t').textContent=msg||'Processando...'}
function hideLdr(){document.getElementById('ldr').style.display='none'}
function pctNat(){return S.cfg.sal_nat/(S.cfg.sal_nat+S.cfg.sal_amanda)}
function pctAmanda(){return 1-pctNat()}
function fixaValorNat(f){
  if(!f.ativa)return 0;
  if(f.div==='nat')return f.valor;
  if(f.div==='50_50')return f.valor*0.5;
  return f.valor*pctNat(); // prop
}
// Quanto Amanda paga nessa fixa
function fixaValorAmanda(f){
  if(!f.ativa)return 0;
  if(f.div==='nat')return 0;
  if(f.div==='50_50')return f.valor*0.5;
  return f.valor*pctAmanda();
}
function totalFixasNat(){return S.fixas.reduce((s,f)=>s+fixaValorNat(f),0)}
function currentMKey(){const t=today();return M2[t.m]||'jun'}
function diasAtras(ts){if(!ts)return 999;return Math.floor((Date.now()-ts)/86400000)}

// ── CICLO DE FATURA ───────────────────────────────────────────────────────
function mesVencC6(){const t=today();return t.d<=S.cfg.venc_c6?M2[t.m]:M2[t.m===12?1:t.m+1]}
function mesVencItau(){const t=today();return t.d<=S.cfg.venc_itau?M2[t.m]:M2[t.m===12?1:t.m+1]}
function obraC6Val(){if(S.cards.c6.mode==='file')return S.cards.c6.obraC6||0;return OBRA_C6[mesVencC6()]||0}
function obraItauVal(){if(S.cards.itau.mode==='file')return S.cards.itau.obraItau||0;return OBRA_ITAU[mesVencItau()]||0}
function c6Total(){return S.cards.c6.mode==='file'?S.cards.c6.total:S.cards.c6.parcial}
function itauTotal(){return S.cards.itau.mode==='file'?S.cards.itau.total:S.cards.itau.parcial}
function c6Pessoal(){return Math.max(0,c6Total()-obraC6Val())}
function itauPessoal(){return Math.max(0,itauTotal()-obraItauVal())}
function c6ImpNat(){return c6Pessoal()*0.5}
function c6Amanda(){return c6Pessoal()*0.5}
function obPaiC6(){return Math.max(0,obraC6Val()-Math.min(S.obraAssumida[mesVencC6()]||0,obraC6Val()))}
function obPaiItau(){return Math.max(0,obraItauVal()-Math.max(0,(S.obraAssumida[mesVencItau()]||0)-obraC6Val()))}

// ── CALCULAR FLUXO ────────────────────────────────────────────────────────
// REGRA FINANCEIRA CORRETA:
// - Pai transfere obra antes do vencimento → entra e sai empatado → não impacta livre
// - Fatura Itaú: você paga só o PESSOAL (obra paga pelo pai, não conta)
// - Fatura C6: você paga 50% do PESSOAL (obra paga pelo pai, Amanda paga 50%)
// - Fixas: soma total do mês uma única vez
// Livre = saldo + sal1(se aplicável) + sal2(se aplicável) - fatPessoalC6 - fatPessoalItau - fixasTotais - extrasSaidas + entrasExtras
function calcFlow(){
  const t=today();
  const saldo=S.cfg.saldo_c6+S.cfg.saldo_itau;
  const fixasTotal=totalFixasNat(); // total do mês, sem duplicar

  // Entradas extras do mês
  const hoje_m=currentMKey();
  const extrasIn=(S.entradas||[]).filter(e=>e.ativa&&(e.recorrente||e.mes===hoje_m));
  const totalExtrasIn=extrasIn.reduce((s,e)=>s+e.valor,0);

  // Eventos em ordem cronológica — cada item no seu dia exato
  const eventos=[];
  const hoje=t.d;

  // Amanda fixa dia 1 — só se ainda não chegou
  if(hoje<1){
    eventos.push({dia:1,tipo:'in',nome:'Amanda — transferência fixa',val:S.cfg.amanda_fixo||1500,
      det:'Carro (50%) + 5º andar + extras casa'});
  }

  // Faturas dos cartões (pai + amanda circulam antes do vencimento)
  if(hoje<S.cfg.venc_c6){
    const pC6=obPaiC6(),amC6=c6Amanda();
    if(pC6>0)eventos.push({dia:S.cfg.venc_c6-1,tipo:'info',nome:'Pai — obra C6',val:pC6,
      det:`Transfere antes do dia ${S.cfg.venc_c6} · você repassa na fatura`});
    if(amC6>0)eventos.push({dia:S.cfg.venc_c6-1,tipo:'info',nome:'Amanda — 50% C6 pessoal',val:amC6,
      det:`Transfere antes do dia ${S.cfg.venc_c6} · você repassa na fatura`});
    eventos.push({dia:S.cfg.venc_c6,tipo:'in',nome:'1º salário',val:S.cfg.sal1});
    const impC6=c6ImpNat();
    const c6Tot=c6Total();
    eventos.push({dia:S.cfg.venc_c6,tipo:'out',
      nome: c6Tot>0?'Fatura C6 — pessoal (50%)':'Fatura C6 — ⚠ informar valor',
      val: impC6,
      det: c6Tot>0
        ?`Total: ${fmt(c6Tot)} · Obra pai: ${fmt(obraC6Val())} · Pessoal: ${fmt(c6Pessoal())} · Seu impacto: ${fmt(impC6)}`
        :'Informe o valor da fatura em Configurar → Faturas dos cartões'
    });
  }

  if(hoje<S.cfg.venc_itau){
    const pIt=obPaiItau();
    if(pIt>0)eventos.push({dia:S.cfg.venc_itau-1,tipo:'info',nome:'Pai — obra Itaú',val:pIt,
      det:`Transfere antes do dia ${S.cfg.venc_itau} · você repassa na fatura`});
    eventos.push({dia:S.cfg.venc_itau,tipo:'in',nome:'2º salário',val:S.cfg.sal2});
    const impIt=itauPessoal();
    const itauTot=itauTotal();
    // Sempre mostra a fatura — mesmo se parcial=0 aparece como "a confirmar"
    eventos.push({dia:S.cfg.venc_itau,tipo:'out',
      nome: itauTot>0?'Fatura Itaú — pessoal':'Fatura Itaú — ⚠ informar valor',
      val: impIt,
      det: itauTot>0
        ?`Total: ${fmt(itauTot)} · Obra pai: ${fmt(obraItauVal())} · Seu impacto: ${fmt(impIt)}`
        :'Informe o valor da fatura em Configurar → Faturas dos cartões'
    });
  }

  // Fixas: cada uma no seu dia exato, apenas as que ainda não venceram
  S.fixas.filter(f=>f.ativa&&f.venc>hoje).forEach(f=>{
    const nat=fixaValorNat(f);
    const amVal=fixaValorAmanda(f);
    let det='';
    if(f.div==='prop') det=`Total: ${fmt(f.valor)} · Nat ${(pctNat()*100).toFixed(0)}%: ${fmt(nat)} · Amanda: ${fmt(amVal)}`;
    else if(f.div==='50_50') det=`Total: ${fmt(f.valor)} · Nat 50%: ${fmt(nat)} · Amanda 50% (já transferiu dia 1)`;
    else det=`100% Nat: ${fmt(nat)}`;
    eventos.push({dia:f.venc,tipo:'out',nome:f.nome,val:nat,det});
  });

  // Entradas extras do mês ainda não recebidas
  extrasIn.filter(e=>!e.dia||e.dia>hoje).forEach(e=>{
    eventos.push({dia:e.dia||28,tipo:'in',nome:e.desc+(e.recorrente?' ↺':''),val:e.valor,det:'Entrada extra'});
  });

  // Ordenar por dia
  eventos.sort((a,b)=>a.dia-b.dia||(a.tipo==='in'?-1:1));

    // CÁLCULO DO LIVRE: só o que realmente impacta Nat
  const entradasReais=eventos.filter(e=>e.tipo==='in').reduce((s,e)=>s+e.val,0);
  const saidasReais=eventos.filter(e=>e.tipo==='out').reduce((s,e)=>s+e.val,0);
  const livre=saldo+entradasReais-saidasReais;

  const diasRest=dim(t.m,t.y)-t.d;
  const gastoDia=diasRest>0?Math.round(Math.max(0,livre)/diasRest):0;
  const pct=(saldo+entradasReais)>0?Math.min(100,Math.round(saidasReais/(saldo+entradasReais)*100)):0;

  let diasAteProx,proxNm;
  if(t.d<S.cfg.venc_c6){diasAteProx=S.cfg.venc_c6-t.d;proxNm='1º salário';}
  else if(t.d<S.cfg.venc_itau){diasAteProx=S.cfg.venc_itau-t.d;proxNm='2º salário';}
  else{diasAteProx=(dim(t.m,t.y)-t.d)+S.cfg.venc_c6;proxNm='1º salário (próx)';}

  // ── VISÃO 1: FLUXO DE CAIXA (tudo que passa pela conta) ─────────────
  const fc_entradas = entradasReais
    + obPaiC6() + obPaiItau()   // obra entra antes de pagar
    + c6Amanda()                 // amanda c6 entra antes de pagar
    + (S.cfg.amanda_fixo||1500); // amanda fixo dia 1 (já recebido este mês)
  
  // Saídas fluxo = saídas reais + obra que circula + parte amanda C6
  const fc_saidas = saidasReais
    + obPaiC6() + obPaiItau()    // obra sai na fatura
    + c6Amanda();                 // amanda 50% sai na fatura C6

  // Amanda fixo dia 1: carro 50% + 5 andar + extras vai para as fixas correspondentes
  // já está no saldo, não conta aqui

  // ── VISÃO 2: GASTO REAL (só o que é seu) ─────────────────────────────
  // Receita: salários
  const gr_receita = S.cfg.sal1 + S.cfg.sal2;
  // Gastos: só o impacto real de Nat nas faturas + fixas proporção dela
  const gr_c6 = c6ImpNat();           // 50% do pessoal C6
  const gr_itau = itauPessoal();       // 100% do pessoal Itaú (só Nat no Itaú)
  const gr_fixas = totalFixasNat();    // fixas na proporção dela
  const gr_total = gr_c6 + gr_itau + gr_fixas;
  const gr_saldo = gr_receita - gr_total;

  // ── VISÃO 3: TERCEIROS (passa pela conta mas não é seu) ───────────────
  const terc_obra = (obPaiC6() + obPaiItau());    // circula zero
  const terc_amanda_c6 = c6Amanda();               // circula zero
  // Amanda fixo: ela dá 1500, você usa para carro(514)+5ºandar(prop)+resto
  const terc_amanda_fixo = S.cfg.amanda_fixo || 1500;
  const terc_amanda_repassa = S.fixas
    .filter(f=>f.ativa)
    .reduce((s,f)=>s+fixaValorAmanda(f), 0);
  const terc_amanda_saldo = terc_amanda_fixo - terc_amanda_repassa; // sobra/falta

  return{
    saldo, entradasReais, saidasReais, livre, gastoDia, pct, diasRest,
    eventos, diasAteProx, proxNm, fixasTotal,
    // Visão 1: fluxo
    fc:{entradas:fc_entradas, saidas:fc_saidas, saldo:saldo+fc_entradas-fc_saidas},
    // Visão 2: gasto real
    gr:{receita:gr_receita, c6:gr_c6, itau:gr_itau, fixas:gr_fixas, total:gr_total, saldo:gr_saldo},
    // Visão 3: terceiros
    terc:{obra:terc_obra, amandaC6:terc_amanda_c6, amandaFixo:terc_amanda_fixo,
          amandaRepassa:terc_amanda_repassa, amandaSaldo:terc_amanda_saldo}
  };
}

// ── CATEGORIZE ────────────────────────────────────────────────────────────
function catFor(desc){
  if(!desc)return'OUTROS';const d=desc.toUpperCase().trim();
  for(const[k,v]of Object.entries(S.depara)){if(d.startsWith(k.toUpperCase()))return v.toUpperCase()}
  for(const[k,v]of Object.entries(S.depara)){if(d.includes(k.toUpperCase()))return v.toUpperCase()}
  if(/RESTAURANTE|PIZZA|BURGER|SUSHI|LANCHE|BAR |CHURRASCO/.test(d))return'RESTAURANTE';
  if(/IFOOD|RAPPI/.test(d))return'IFOOD';
  if(/SUPER|MERCADO|HORTIFRUTI|PANIFICAD/.test(d))return'SUPERMERCADO';
  if(/POSTO|GASOLINA|COMBUSTIVEL/.test(d))return'GASOLINA';
  if(/UBER|99APP|CABIFY|METRO|SUPERVIA/.test(d))return'TRANSPORTE';
  if(/FARMACIA|DROGARIA|DROGBA/.test(d))return'SAUDE';
  if(/NETFLIX|SPOTIFY|APPLE|DISNEY/.test(d))return'ASSINATURA';
  if(/LEROY|MARMORARIA|RADSONPLAN|DISTRIBUIDORA|SANTIL|LUSTRES|CORANTE/.test(d))return'OBRA';
  if(/PET|COBASI|PETZ|PETLOVE/.test(d))return'PET';
  return'OUTROS';
}

// ── PDF PARSER ────────────────────────────────────────────────────────────
async function parseItauPDF(buf){
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const DR=/^\d{2}\/\d{2}$/,VR=/^-?[\d.]+,\d{2}$/;
  let total=0,venc='';const curr=[],prox=[];
  for(let pg=1;pg<=pdf.numPages;pg++){
    const page=await pdf.getPage(pg);const vp=page.getViewport({scale:1});const ct=await page.getTextContent();
    if(pg===1){const ft=ct.items.map(i=>i.str).join(' ');
      const mv=ft.match(/Vencimento:\s*(\d{2}\/\d{2}\/\d{4})/);if(mv)venc=mv[1];
      const mt=ft.match(/Total desta fatura\s+([\d.]+,\d{2})/);if(mt)total=parseFloat(mt[1].replace(/\./g,'').replace(',','.'));
      continue;}
    const mid=vp.width*.5,cl={};
    for(const it of ct.items){if(!it.str.trim())continue;
      const col=it.transform[4]<mid?'L':'R',y=Math.round(it.transform[5]/3)*3,k=col+'_'+y;
      if(!cl[k])cl[k]=[];cl[k].push({t:it.str.trim(),x:it.transform[4],col});}
    const ks=Object.keys(cl).sort((a,b)=>parseFloat(b.split('_')[1])-parseFloat(a.split('_')[1]));
    const sc={L:null,R:null},lt={L:null,R:null};
    for(const k of ks){
      const its=cl[k].sort((a,b)=>a.x-b.x),tx=its.map(i=>i.t),ln=tx.join(' '),col=its[0].col;
      if(/compras e saques/i.test(ln)){sc[col]='c';continue}
      if(/Compras parceladas/i.test(ln)){sc[col]='p';continue}
      if(/Total dos lan|Lançamentos no cartão|Próxima fatura|Demais faturas|Encargos cobrados|Limites de crédito|Pagamentos efetuados/i.test(ln)){sc[col]=null;continue}
      const s=sc[col];if(!s||/DATA.*ESTABELECIMENTO|NATHALIA/i.test(ln))continue;
      if(tx.length>=2&&DR.test(tx[0])&&VR.test(tx[tx.length-1])){
        const val=parseFloat(tx[tx.length-1].replace(/\./g,'').replace(',','.'));if(val<=0)continue;
        const estab=tx.slice(1,-1).join(' ');const e={data:tx[0],estab,valor:val,cat:catFor(estab)};
        if(s==='c'){curr.push(e);lt[col]=e;}else{prox.push(e);lt[col]=e;}
      } else if(tx.length>=1&&!DR.test(tx[0])&&!VR.test(tx[0])&&lt[col]){
        const c=tx[0].toLowerCase();if(!c.match(/\d/)&&c.length>2&&c.length<25&&lt[col].cat==='OUTROS')lt[col].cat=c.toUpperCase();}
    }
  }
  const obra=curr.filter(t=>t.cat==='OBRA').reduce((s,t)=>s+t.valor,0);
  return{curr,prox,total,venc,obraItau:obra,pessoal:total-obra};
}

function parseC6Xlsx(wb){
  const txns=[];
  for(const name of wb.SheetNames){
    const ws=wb.Sheets[name];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    let hdr=-1;for(let i=0;i<10;i++){if(rows[i]&&rows[i].some(c=>c&&String(c).toLowerCase().includes('descri'))){hdr=i;break}}
    if(hdr<0)continue;
    const h=rows[hdr].map(c=>c?String(c).toLowerCase():'');const iD=h.findIndex(x=>x.includes('descri'));
    const mns=['mai','jun','jul','ago','set','out','nov','dez','jan'];const mc={};
    h.forEach((v,i)=>{const m=mns.find(n=>v===n||v.includes(n));if(m&&!mc[m])mc[m]=i});
    for(let i=hdr+1;i<rows.length;i++){
      const r=rows[i];if(!r)continue;const desc=r[iD]?String(r[iD]).trim():'';if(!desc||desc==='Descrição')continue;
      const months={};for(const[mn,col]of Object.entries(mc)){if(r[col]!==null){const v=parseFloat(r[col])||0;if(v!==0)months[mn]=v}}
      if(!Object.keys(months).length)continue;
      txns.push({src:'c6',estab:desc,cat:catFor(desc),isObra:catFor(desc)==='OBRA',months});
    }
  }
  return txns;
}

// ── FILE HANDLERS ─────────────────────────────────────────────────────────
async function handleFile(e,which){
  const file=e.target.files[0];if(!file)return;
  const isPDF=file.name.toLowerCase().endsWith('.pdf');
  showLdr(isPDF?`Lendo PDF Itaú...`:`Lendo XLSX ${which==='itau'?'Itaú':'C6'}...`);
  try{
    const buf=await file.arrayBuffer();
    if(which==='itau'){
      if(isPDF){
        const res=await parseItauPDF(buf);
        S.cards.itau={mode:'file',parcial:S.cards.itau.parcial,total:res.total,obraItau:res.obraItau,pessoal:res.pessoal,fatura:res,loaded:true,venc:res.venc};
        toast(`✓ Itaú: ${res.curr.length} lançamentos · pessoal ${fmt(res.pessoal)}`);
      } else {
        const wb=XLSX.read(new Uint8Array(buf),{type:'array'});const txns=[];let total=0,obraItau=0;
        for(const name of wb.SheetNames){
          const ws=wb.Sheets[name];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
          let hdr=-1;for(let i=0;i<10;i++){if(rows[i]&&rows[i].some(c=>c&&String(c).toLowerCase().includes('estabelecimento'))){hdr=i;break}}
          if(hdr<0)continue;const h=rows[hdr].map(c=>c?String(c).toLowerCase():'');const iE=h.findIndex(x=>x.includes('estabelecimento'));
          const mns=['mai','jun','jul','ago','set','out','nov','dez','jan'];const mc={};
          h.forEach((v,i)=>{const m=mns.find(n=>v===n||v.includes(n));if(m&&!mc[m])mc[m]=i});
          for(let i=hdr+1;i<rows.length;i++){const r=rows[i];if(!r||!r[iE])continue;const estab=String(r[iE]).trim();const cat=catFor(estab);
            for(const[mn,col]of Object.entries(mc)){if(r[col]!==null){const v=parseFloat(r[col])||0;if(v!==0){txns.push({src:'itau',estab,cat,valor:v,isObra:cat==='OBRA',month:mn,data:''});total+=v;if(cat==='OBRA')obraItau+=v;}}}}
        }
        S.cards.itau={mode:'file',parcial:S.cards.itau.parcial,total,obraItau,pessoal:total-obraItau,fatura:{curr:txns,prox:[]},loaded:true,venc:''};
        toast(`✓ Itaú XLSX: ${txns.length} lançamentos`);
      }
    } else {
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});const txns=parseC6Xlsx(wb);
      if(!txns.length){toast('⚠️ Nenhuma transação no C6.');hideLdr();return;}
      const total=txns.reduce((s,t)=>s+Object.values(t.months).reduce((a,b)=>a+(b>0?b:0),0),0);
      const obraC6=txns.filter(t=>t.isObra).reduce((s,t)=>s+Object.values(t.months).reduce((a,b)=>a+(b>0?b:0),0),0);
      S.cards.c6={mode:'file',parcial:S.cards.c6.parcial,total,obraC6,fatura:txns,loaded:true};
      toast(`✓ C6: ${txns.length} transações`);
    }
    save();renderAll();
  }catch(err){console.error(err);toast('Erro ao ler o arquivo.');}
  finally{hideLdr();if(e.target)e.target.value='';}
}

    document.getElementById('e-desc').value=e.desc;document.getElementById('e-val').value=e.valor;
    document.getElementById('e-dia').value=e.dia;document.getElementById('e-mes').value=e.mes||currentMKey();
    document.getElementById('e-rec').value=e.recorrente?'1':'0';del.style.display='block';
  }
  document.getElementById('embg').style.display='flex';
}
function closeEntrada(ev){if(ev&&ev.target!==document.getElementById('embg'))return;document.getElementById('embg').style.display='none';}
function saveEntrada(){
  const desc=document.getElementById('e-desc').value.trim();
  const valor=parseFloat(document.getElementById('e-val').value)||0;
  const dia=parseInt(document.getElementById('e-dia').value)||1;
  const mes=document.getElementById('e-mes').value;
  const rec=document.getElementById('e-rec').value==='1';
  if(!desc||!valor){toast('Preencha descrição e valor');return;}
  if(!S.entradas)S.entradas=[];
  if(S.editEntradaId===null)S.entradas.push({id:Date.now(),desc,valor,dia,mes,recorrente:rec,ativa:true});
  else{const e=S.entradas.find(x=>x.id===S.editEntradaId);if(e){e.desc=desc;e.valor=valor;e.dia=dia;e.mes=mes;e.recorrente=rec;}}
  save();document.getElementById('embg').style.display='none';renderAll();toast(S.editEntradaId===null?'✓ Entrada adicionada':'✓ Entrada atualizada');
}
function delEntrada(){
  if(!confirm('Excluir?'))return;
  S.entradas=(S.entradas||[]).filter(x=>x.id!==S.editEntradaId);
  save();document.getElementById('embg').style.display='none';renderAll();toast('Removida');
}
function togEntrada(id){
  const e=(S.entradas||[]).find(x=>x.id===id);
  if(e){e.ativa=!e.ativa;save();renderAll();toast(e.ativa?'✓ Ativada':'Desativada');}
}

// ── NAV ───────────────────────────────────────────────────────────────────
function go(tab){
  S.activeTab=tab;
  ['hoje','sim','cfg'].forEach(t=>{document.getElementById('v-'+t).classList.toggle('on',t===tab);document.getElementById('tb-'+t).classList.toggle('on',t===tab);});
  document.getElementById('hd-ttl').textContent={hoje:'Hoje',sim:'Simular',cfg:'Configurar'}[tab];
  document.getElementById('scrl').scrollTop=0;
  if(tab==='hoje')renderHoje();else if(tab==='sim')renderSim();else renderCfg();
}
function refreshAll(){renderAll();toast('Atualizado');}
function renderAll(){if(S.activeTab==='hoje')renderHoje();else if(S.activeTab==='sim')renderSim();else renderCfg();}

// ── INIT ──────────────────────────────────────────────────────────────────
const T=today();
document.getElementById('hd-sub').textContent=`${T.d} ${T.mn} · ${T.dow}`;
load();renderHoje();
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setTimeout(()=>toast('💡 Adicione à tela inicial'),3000);});
</script>
